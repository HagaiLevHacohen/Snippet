
services:
  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: snippet-backend
    ports:
      - "3000:3000"
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules # Mount node_modules as a volume to persist installed dependencies
    command: sh -c "npx prisma migrate deploy && npm run dev" # Apply database migrations and start the server

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: snippet-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules # Mount node_modules as a volume to persist installed dependencies
    command: npm run dev -- --host
    depends_on:
      - backend

  # Postgres database
  db:
    image: postgres:15-alpine
    container_name: snippet-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snippet_db
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d snippet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: snippet-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

# Named volumes for persistence
volumes:
  db-data:
  redis-data:
  backend-node-modules:
  frontend-node-modules:


# To access Prisma Studio for the backend, run the following command in your terminal:
# docker exec -it snippet-backend npx prisma studio --port 5555 --browser none

# To reset the database, you can run:
# docker exec -it snippet-backend npx prisma migrate reset

# To build and start the containers, use the following command:
# docker compose up --build --no-cache

# To stop and remove the containers, networks, and volumes, use the following command (also removes database data):
# docker compose down -v